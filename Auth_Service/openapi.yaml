openapi: 3.0.3
info:
  title: Auth Service API
  description: API для аутентификации пользователей, включая регистрацию, вход, выход, сброс пароля и авторизацию через Google OAuth2.
  version: 1.0.0

servers:
  - url: http://localhost:8000
    description: Локальный сервер

paths:
  /:
    get:
      summary: Проверка доступности API
      responses:
        '200':
          description: API доступен
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: API is running

  /auth/sign-up:
    post:
      summary: Регистрация нового пользователя
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUp'
      responses:
        '200':
          description: Успешная регистрация
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: user created successfully
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Ошибка валидации или данных

  /auth/sign-in:
    post:
      summary: Авторизация пользователя
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignIn'
      responses:
        '200':
          description: Успешный вход
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: user SignIn successfully
                  token:
                    type: string
        '400':
          description: Неверные учетные данные

  /auth/sign-out:
    post:
      summary: Выход из системы
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Успешный выход
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: successfully logout
        '400':
          description: Ошибка при выходе

  /auth/sign-reset-password-request:
    post:
      summary: Запрос на сброс пароля
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Письмо для сброса отправлено
        '400':
          description: Ошибка при отправке письма

  /auth/sign-reset-password-confirm:
    post:
      summary: Подтверждение сброса пароля
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordConfirm'
      responses:
        '200':
          description: Пароль успешно изменён
        '400':
          description: Ошибка подтверждения

  /auth/verify-email:
    get:
      summary: Подтверждение email по токену
      tags: [Auth]
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: Токен подтверждения email
      responses:
        '200':
          description: Email успешно подтвержден
        '400':
          description: Ошибка верификации токена

  /auth/google/login:
    get:
      summary: Перенаправление на Google OAuth
      tags: [Google OAuth]
      responses:
        '302':
          description: Перенаправление на страницу авторизации Google

  /auth/google/callback:
    get:
      summary: Callback от Google OAuth
      tags: [Google OAuth]
      parameters:
        - name: state
          in: query
          required: true
          schema:
            type: string
        - name: code
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Успешный вход через Google
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Ошибка при авторизации через Google

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          example: user
        email_verified:
          type: boolean
        google_id:
          type: string
          nullable: true
        avatar_url:
          type: string
          format: uri
          nullable: true
        created:
          type: string
          format: date-time
        updated:
          type: string
          format: date-time

    SignUp:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          example: John Doe
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          format: password
          example: "mypassword123"

    SignIn:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    ResetPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: user@example.com

    ResetPasswordConfirm:
      type: object
      required: [email, token, new_password]
      properties:
        email:
          type: string
          format: email
        token:
          type: string
        new_password:
          type: string
          format: password
