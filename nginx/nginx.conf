user root;
worker_processes auto;

events {
    worker_connections 8192;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    map $request_method $skip_cache {
        POST    1;
        default 0;
    }


    limit_req_zone $binary_remote_addr zone=one_per_sec:5m rate=100r/s;


    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=my_cache:10m max_size=500m inactive=60m;

    # Упрощенный ключ кэширования
    proxy_cache_key "$scheme$host$request_uri";

    proxy_cache_valid 200 302 10m;
    proxy_cache_valid 404 1m;

    # Включаем кэширование HEAD как GET
    proxy_cache_convert_head on;

    # Кэшируем только GET и HEAD
    proxy_cache_methods GET HEAD;


    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    server {

        listen 443 ssl;
        http2 on;
        server_name localhost;

        ssl_certificate /etc/nginx/ssl/self-signed.crt;
        ssl_certificate_key /etc/nginx/ssl/self-signed.key;

        ssl_session_cache shared:SSL:1m;
        ssl_session_timeout 5m;


        ssl_prefer_server_ciphers off;

        gzip on;
        gzip_min_length 100;
        gzip_comp_level 3;
        gzip_types text/plain text/css text/javascript application/javascript
                   application/x-javascript application/json application/xml
                   application/xml+rss application/wasm font/ttf font/otf
                   font/woff font/woff2 image/svg+xml;

        gzip_disable "msie6";



        location / {
            proxy_pass http://frontend:80/;
            limit_req zone=one_per_sec burst=5;
            limit_req_status 429;
        }

        location = /auth/google/callback {
                # ОТКЛЮЧАЕМ КЭШ полностью
                proxy_cache_bypass 1;
                proxy_no_cache 1;

                # Отправляем в auth-service
                proxy_pass http://auth-service:8000/auth/google/callback;

                # Заголовки
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;

                # Отключаем кэширование браузера
                add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
                add_header Pragma "no-cache" always;
                expires off;
        }

        location = /auth/callback {
            # Отключаем кэш
            proxy_cache_bypass 1;
            proxy_no_cache 1;

            # Отправляем во фронтенд
            proxy_pass http://frontend:80;

            # Для SPA - всегда index.html
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Или напрямую отдаем index.html
            # root /usr/share/nginx/html;
            # try_files /index.html =404;
        }

        location /auth/ {
            proxy_pass http://auth-service:8000/;
            rewrite ^/auth/google/(.*)$ /$1 break;

            proxy_cache_bypass $skip_cache;
            proxy_no_cache $skip_cache;

            proxy_ignore_headers X-Accel-Redirect X-Accel-Expires Expires Cache-Control Set-Cookie Vary;

            proxy_cache my_cache;
            proxy_cache_valid 200 302 10m;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;

            add_header X-Proxy-Cache $upstream_cache_status always;

            if ($request_method = POST) {
                add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
                add_header Pragma "no-cache" always;
                add_header Expires "0" always;
            }
        }

        location /profile/ {
            proxy_pass http://profile-service:7000/;

            proxy_cache my_cache;
                proxy_cache_valid 200 10m;

                add_header X-Upstream-Cache-Status "$upstream_cache_status" always;
                add_header X-Test-Minimal "yes" always;

            add_header X-Proxy-Cache $upstream_cache_status always;

            add_header X-Cache-Key "$scheme$host$request_uri" always;
            add_header X-Skip-Cache "$skip_cache" always;
            add_header X-Backend-Cache "$upstream_http_cache_control" always;

            if ($request_method = POST) {
                add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
                add_header Pragma "no-cache" always;
                add_header Expires "0" always;
            }
        }

        location /request/ {
            proxy_pass http://request-service:3000/;

            proxy_cache_bypass $skip_cache;
            proxy_no_cache $skip_cache;

            proxy_ignore_headers X-Accel-Redirect X-Accel-Expires Expires Cache-Control Set-Cookie Vary;

            proxy_cache my_cache;
            proxy_cache_valid 200 302 10m;

            add_header X-Proxy-Cache $upstream_cache_status always;

            if ($request_method = POST) {
                add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
                add_header Pragma "no-cache" always;
                add_header Expires "0" always;
            }
        }

        location /notification/ {
            proxy_pass http://notification-service:5000/ws/;

            proxy_set_header Upgrade $http_upgrade;
            proxy_cache_bypass 1;
            proxy_no_cache 1;
        }

    }

    server {
        listen 80;
        server_name localhost;
        return 301 https://$server_name$request_uri;
    }
}